version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mockinaja_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockinaja
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: mockinaja_backend
    environment:
      DATABASE_URL: "host=db user=postgres password=postgres dbname=mockinaja port=5432 sslmode=disable"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mockinaja_frontend
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
